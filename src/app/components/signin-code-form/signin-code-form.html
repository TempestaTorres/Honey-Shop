<form
  (ngSubmit)="onSubmit()"
  [formGroup]="codeForm"
  novalidate
  class="digit-code-form">

  <div class="spinner-wrapper">

    <div class="digit-field" [class.active]="!spinnerActive()" [class.shake]="codeShake()">

      <input
        (keydown)="onInputChange($event)"
        formControlName="digitInput"
        aria-label="6-digit code"
             required
             type="text"
             inputmode="numeric"
             autocomplete="one-time-code"
             class="digit-field__input">

      <div class="digit-wrapper">

        @for (d of [1,2,3,4,5,6]; track $index) {

          <div #digit class="digit-container" [attr.data-id]="d">
            <div class="code-digit" [class.code-active]="d === digitActive()">
              <span></span>
            </div>
          </div>

        }

      </div>

    </div>

    @if (codeError()) {

      <div class="digit-code-error">
        <span>Enter the correct 6-digit code</span>
      </div>
    }
    <!-- Spinner -->
    <div class="digit-spinner" [class.active]="spinnerActive()">
      <div class="digit-spinner__spinner">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" focusable="false" aria-label="Verification in progress" class="_1ggkr8pf _1ggkr8pe _1fragem37 _1fragemwg _1fragems7 _1fragemrx"><path d="M32 16c0 8.837-7.163 16-16 16S0 24.837 0 16 7.163 0 16 0v2C8.268 2 2 8.268 2 16s6.268 14 14 14 14-6.268 14-14z"></path></svg>
      </div>
    </div>

  </div>

  <div class="submit">
    <button #submit type="submit" tabindex="-1" aria-hidden="true">Submit</button>
  </div>
</form>
