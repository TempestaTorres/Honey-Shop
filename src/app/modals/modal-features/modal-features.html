<div class="modal-dialog type-slideout" [class.modal-dialog-opened]="open()">
  <div class="modal-dialog-overlay" (mousedown)="closeModal()"></div>

  <!--  Modal window -->
  <div class="modal-dialog-content js-content-modal-dialog">
    <div>
      <!-- Close button -->
      <button (click)="closeModal()" type="button" class="js-close-modal-dialog" aria-label="close">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 16 16" fill="none" role="img" aria-labelledby="title-icon-close">
          <title id="title-icon-close">Icon of close</title>
          <g id="icon-close">
            <path d="M12.5 3.5L3.5 12.5" stroke="currentColor" stroke-linecap="square"></path>
            <path d="M12.5 12.5L3.5 3.5" stroke="currentColor" stroke-linecap="square" stroke-linejoin="round"></path>
          </g>
        </svg>
      </button>
    </div>

    <!--    Content -->
    <div class="modal-dialog-inner">
      @if (index() !== "0") {
        <app-tab-list-description
          (navigate)="navigateTo($event)"
          class="tab-list-product-description tab-divider-hidden"
          [index]="index()"></app-tab-list-description>
      }
    </div>
  </div>

</div>
