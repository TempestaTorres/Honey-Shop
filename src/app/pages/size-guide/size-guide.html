<main class="outline-none">
  <!--  Anchor links -->
  <section class="section-anchor-link">
    <div class="container">
      <div class="js-anchor-link">
        <!-- Link -->
        <div class="js-anchor-link__link">
          <button
            (click)="anchorClick(bodysuit)"
            class="button-beige button-small js-anchor-button" type="button">BODYSUIT & CORSET</button>
        </div>
        <!-- Link -->

      </div>
    </div>
  </section>

  <!--  Size guide -->
  <section class="section-boxed section-accordion-list">
    <div class="container">
      <!-- Accordion -->
      <div class="accordion-list-widget accordion-list-type-medium">
        <!-- Header -->
        <div class="js-accordion-list-header">
          <a class="button-icon-beige width-full" href="mailto:honey@honey.com" title="Email us">
            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" class="icon " fill="none" viewBox="0 0 20 20" role="presentation" disabled="true" clickable="false">
              <title>Icon of email</title>
              <path stroke="#000" stroke-linecap="square" d="M2.5 4.375h15V15a.624.624 0 0 1-.625.625H3.125A.625.625 0 0 1 2.5 15V4.375Z"></path>
              <path stroke="#000" stroke-linecap="round" stroke-linejoin="round" d="M17.5 4.375 10 11.25 2.5 4.375"></path>
            </svg>
            <span>Email us</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 12 12" fill="none" role="presentation" disabled="true" clickable="false" aria-hidden="true">
              <title>Icon of chevron right</title>
              <path id="icon-chevron-right" d="M4.625 2.5625L8.0625 6L4.625 9.4375" stroke="currentColor" stroke-linecap="square"></path>
            </svg>
          </a>
        </div>

        <!-- Accordion Item -->
        <div #bodysuit class="accordion-item js-accordion-item accordion--faqs" [class.active]="openedItem() === '1'">
          <!-- Header -->
          <button #accordionHeader type="button" [attr.data-id]="1"
                  (click)="toggleItem('1')"
                  class="accordion-item-title js-accordion-button">
            <span class="text">Bodysuit & Corset Sizing</span>
            <div class="js-accordion-button__icons-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon accordion-item-icon-open" viewBox="0 0 12 12" fill="none" role="presentation" disabled="true" clickable="false" aria-hidden="true">
                <title id="title-icon-plus">Icon of plus</title>
                <g id="icon-plus">
                  <path d="M1.875 6H10.125" stroke="currentColor" stroke-linecap="square" stroke-linejoin="round"></path>
                  <path d="M6 1.875V10.125" stroke="currentColor" stroke-linecap="square" stroke-linejoin="round"></path>
                </g>
              </svg>
              <svg xmlns="http://www.w3.org/2000/svg" class="icon accordion-item-icon-close " viewBox="0 0 12 12" fill="none" role="presentation" disabled="true" clickable="false" aria-hidden="true">
                <title id="title-icon-minus">Icon of minus</title>
                <path id="icon-minus" d="M1.875 6H10.125" stroke="currentColor" stroke-linecap="square" stroke-linejoin="round"></path>
              </svg>
            </div>
          </button>

          <!-- Content -->
          <div class="accordion-item-description">
            <div class="js-accordion-content shopify-policy__container">
              <p>Content</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
